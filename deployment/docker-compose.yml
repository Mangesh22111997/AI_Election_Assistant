version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: election-assistant:latest
    container_name: election-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data/vector_store:/app/data/vector_store
      - ../firebase-adminsdk.json:/app/firebase-adminsdk.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: election-assistant:latest
    container_name: election-frontend
    ports:
      - "8501:8501"
    env_file:
      - ../.env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    command: >
      streamlit run frontend/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
      --browser.gatherUsageStats false

volumes:
  vector_store:
